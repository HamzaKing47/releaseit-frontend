<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <link rel="apple-touch-icon" href="/app-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Shopify App Bridge — embeds the app inside Shopify admin and renders
         the nav menu in Shopify's own sidebar. The API key is the app's
         public Client ID (safe to expose).
         IMPORTANT: load App Bridge ONLY on /admin routes. App Bridge force-
         embeds any page that has a ?shop= param into the Shopify admin, which
         would otherwise hijack the customer-facing COD form (served at "/"). -->
    <script>
      // document.write keeps App Bridge a synchronous, parser-inserted script
      // (App Bridge refuses to run if loaded async/defer/module). It is only
      // written on /admin routes so the customer COD form at "/" is never
      // force-embedded into the Shopify admin.
      if (window.location.pathname.indexOf("/admin") === 0) {
        document.write(
          '<meta name="shopify-api-key" content="1682ecf4f171ef91c740b0c0445d2803">'
        );
        document.write(
          '<scr' + 'ipt src="https://cdn.shopify.com/shopifycloud/app-bridge.js"><\/scr' + 'ipt>'
        );
      }
    </script>
    <title>Order Now — COD Form & Upsells</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
