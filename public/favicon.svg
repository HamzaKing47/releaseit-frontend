<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D28D9"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="bag" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF2FF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1E1B4B" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Background tile (Shopify rounds corners automatically) -->
  <rect width="1200" height="1200" rx="270" fill="url(#bg)"/>

  <!-- Subtle highlight -->
  <circle cx="330" cy="300" r="430" fill="#FFFFFF" opacity="0.06"/>

  <!-- Shopping bag -->
  <g filter="url(#soft)">
    <path d="M345 470
             h510
             a40 40 0 0 1 39.7 34.6
             l66 470
             a70 70 0 0 1 -69.3 79.4
             h-582.8
             a70 70 0 0 1 -69.3 -79.4
             l66 -470
             a40 40 0 0 1 39.7 -34.6 z"
          fill="url(#bag)"/>
    <!-- Bag handle -->
    <path d="M430 470
             v-40
             a170 170 0 0 1 340 0
             v40"
          fill="none" stroke="#FFFFFF" stroke-width="58" stroke-linecap="round"/>
  </g>

  <!-- Checkmark (order confirmed) -->
  <path d="M478 760 l78 80 l168 -178"
        fill="none" stroke="#4F46E5" stroke-width="70"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
